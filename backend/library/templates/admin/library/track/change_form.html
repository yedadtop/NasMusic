{% extends "admin/change_form.html" %}

{% block after_related_objects %}
{{ block.super }}
<div class="module aligned" id="metadata-section">
    <h2>音频文件元数据</h2>
    <div class="form-row">
        <div id="metadata-status" style="padding: 8px 0; display: none;"></div>
        <table id="metadata-table" style="width: 100%; border-collapse: collapse; margin-bottom: 16px;">
            <thead>
                <tr>
                    <th style="text-align: left; padding: 8px; border-bottom: 2px solid #eee; width: 20%;">标签键</th>
                    <th style="text-align: left; padding: 8px; border-bottom: 2px solid #eee; width: 30%;">值</th>
                    <th style="text-align: left; padding: 8px; border-bottom: 2px solid #eee; width: 35%;">字段说明</th>
                    <th style="text-align: center; padding: 8px; border-bottom: 2px solid #eee; width: 15%;">操作</th>
                </tr>
            </thead>
            <tbody>
                <tr id="metadata-loading">
                    <td colspan="4" style="padding: 16px; text-align: center; color: #999;">正在读取元数据...</td>
                </tr>
            </tbody>
        </table>

        <div style="background: #f8f8f8; border: 1px solid #eee; border-radius: 4px; padding: 12px; margin-top: 8px;">
            <strong style="display: block; margin-bottom: 8px;">新增元数据</strong>
            <div style="display: flex; gap: 8px; align-items: flex-end;">
                <div style="flex: 1;">
                    <label style="display: block; font-size: 11px; color: #666; margin-bottom: 2px;">标签键</label>
                    <input type="text" id="meta-key" placeholder="例如: ALBUM 或 GENRE" style="width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px;" />
                </div>
                <div style="flex: 2;">
                    <label style="display: block; font-size: 11px; color: #666; margin-bottom: 2px;">值</label>
                    <input type="text" id="meta-value" placeholder="标签值" style="width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px;" />
                </div>
                <div>
                    <button type="button" id="meta-add-btn" class="default" style="white-space: nowrap; padding: 6px 20px;">新增</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block admin_change_form_document_ready %}
{{ block.super }}
<script>
(function() {
    const metaUrl = '{% url "admin:library_track_metadata" object_id %}';
    const statusEl = document.getElementById('metadata-status');
    const tbody = document.querySelector('#metadata-table tbody');
    const keyInput = document.getElementById('meta-key');
    const valueInput = document.getElementById('meta-value');
    const addBtn = document.getElementById('meta-add-btn');

    function showStatus(msg, isError) {
        statusEl.style.display = 'block';
        statusEl.style.color = isError ? '#ba2121' : '#147a3b';
        statusEl.style.background = isError ? '#fbe9e9' : '#e9f7ef';
        statusEl.style.padding = '8px 12px';
        statusEl.style.borderRadius = '4px';
        statusEl.style.marginBottom = '8px';
        statusEl.textContent = msg;
        setTimeout(function() { statusEl.style.display = 'none'; }, 4000);
    }

    function renderTable(metadata) {
        tbody.innerHTML = '';

        if (metadata.length === 1 && metadata[0].key === '_error') {
            tbody.innerHTML = '<tr><td colspan="4" style="padding: 16px; text-align: center; color: #ba2121;">读取错误: ' + escapeHtml(metadata[0].value) + '</td></tr>';
            return;
        }

        if (!metadata || metadata.length === 0) {
            var tr = document.createElement('tr');
            tr.innerHTML = '<td colspan="4" style="padding: 16px; text-align: center; color: #999;">暂无元数据</td>';
            tbody.appendChild(tr);
            return;
        }

        metadata.sort(function(a, b) {
            if (a.key === '__EMBEDDED_COVER__') return -1;
            if (b.key === '__EMBEDDED_COVER__') return 1;
            if (a.key < b.key) return -1;
            if (a.key > b.key) return 1;
            return 0;
        });

        for (var i = 0; i < metadata.length; i++) {
            var item = metadata[i];
            var key = item.key;
            var value = item.value;
            var idx = item._idx !== undefined ? item._idx : -1;
            var description = item.description || '';
            var warning = item.warning || null;
            var coverData = item.cover_data || null;

            var tr = document.createElement('tr');
            tr.style.borderBottom = '1px solid #f0f0f0';

            if (key === '__EMBEDDED_COVER__') {
                tr.style.background = '#f8f9fa';
                var coverHtml = '';
                var hasError = item.has_error || false;
                var noCover = item.no_cover || false;

                if (coverData && !hasError) {
                    coverHtml =
                        '<div style="text-align: center; margin: 4px 0;">' +
                        '<img src="' + coverData + '" ' +
                        'style="max-width: 120px; max-height: 120px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); object-fit: contain;" ' +
                        'alt="嵌入封面" />' +
                        '</div>';
                } else if (hasError) {
                    coverHtml = '<span style="color: #ba2121; font-size: 11px;">❌ ' + escapeHtml(value) + '</span>';
                } else if (noCover) {
                    coverHtml =
                        '<div style="background: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; padding: 6px; margin-top: 4px; text-align: center;">' +
                        '<span style="color: #856404; font-size: 11px;">📷 无嵌入封面</span>' +
                        '</div>';
                } else {
                    coverHtml = '<span style="color: #ba2121; font-size: 11px;">❌ 无法读取</span>';
                }

                tr.innerHTML =
                    '<td colspan="2" style="padding: 6px 8px; vertical-align: middle;">' +
                    '<strong style="font-size: 13px; color: #333;">封面</strong> ' +
                    '<span style="color: #888; font-size: 11px;">(' + escapeHtml(value) + ')</span>' +
                    '</td>' +
                    '<td style="padding: 6px 8px; vertical-align: middle; width: 35%;">' +
                    '<span style="color: #666; font-size: 11px;">' + escapeHtml(description) + '</span>' +
                    '</td>' +
                    '<td style="padding: 6px 8px; text-align: center; vertical-align: middle;">' +
                    coverHtml +
                    '</td>' +
                    '<td style="padding: 6px 8px; text-align: center; vertical-align: middle;">' +
                    '<span style="color: #999; font-size: 10px;">只读</span>' +
                    '</td>';
                tbody.appendChild(tr);
                continue;
            }

            var descHtml = description ?
                '<span style="color: #666; font-size: 12px; line-height: 1.4; display: block;">' + escapeHtml(description) + '</span>' :
                '<span style="color: #999; font-size: 11px; font-style: italic;">暂无说明</span>';

            var warningAttr = warning ? ' data-warning=\'' + JSON.stringify(warning).replace(/'/g, "\\'") + '\'' : '';

            tr.innerHTML =
                '<td style="padding: 8px; font-weight: 600; font-family: \'Microsoft YaHei\', \'微软雅黑\', sans-serif; word-break: break-all; vertical-align: top;">' + escapeHtml(key) + '</td>' +
                '<td style="padding: 8px; word-break: break-all; color: #555; font-family: \'Microsoft YaHei\', \'微软雅黑\', sans-serif; vertical-align: top;">' + escapeHtml(value) + '</td>' +
                '<td style="padding: 8px; vertical-align: top;">' + descHtml + '</td>' +
                '<td style="padding: 8px; text-align: center; vertical-align: middle;">' +
                '<button type="button" class="button meta-del-btn" data-key="' + escapeHtml(key) + '" data-idx="' + idx + '"' + warningAttr + ' style="padding: 4px 12px; font-size: 12px; background: #ba2121; color: #fff;">删除</button>' +
                '</td>';
            tbody.appendChild(tr);
        }
        bindDeleteButtons();
    }

    function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    function resetAddForm() {
        keyInput.value = '';
        valueInput.value = '';
    }

    function sendRequest(action, key, value, idx) {
        var formData = new FormData();
        formData.append('action', action);
        formData.append('key', key);
        if (value !== undefined && value !== null) {
            formData.append('value', value);
        }
        if (idx !== null && idx !== undefined && idx >= 0) {
            formData.append('idx', idx);
        }
        formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);

        var xhr = new XMLHttpRequest();
        xhr.open('POST', metaUrl, true);
        xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');

        xhr.onload = function() {
            try {
                var resp = JSON.parse(xhr.responseText);
                if (resp.success) {
                    showStatus(resp.message || '操作成功', false);
                    renderTable(resp.metadata);
                    if (action === 'add') resetAddForm();
                } else {
                    showStatus(resp.message || '操作失败', true);
                }
            } catch (e) {
                showStatus('服务器返回异常: ' + xhr.responseText, true);
            }
        };

        xhr.onerror = function() {
            showStatus('网络请求失败，请检查连接', true);
        };

        xhr.send(formData);
    }

    function bindDeleteButtons() {
        var delBtns = tbody.querySelectorAll('.meta-del-btn');

        for (var j = 0; j < delBtns.length; j++) {
            delBtns[j].addEventListener('click', function(e) {
                e.preventDefault();
                var key = this.getAttribute('data-key');
                var idx = parseInt(this.getAttribute('data-idx'), 10);
                var warningStr = this.getAttribute('data-warning');
                var warning = warningStr ? JSON.parse(warningStr) : null;

                var confirmMessage = '';
                if (warning) {
                    if (warning.severity === 'high') {
                        confirmMessage = '⚠️ ' + warning.warning + '\n\n' +
                            '📌 后果说明：\n' + warning.consequence + '\n\n' +
                            '⚠️ 强烈建议保留此字段！确定要继续删除吗？';
                    } else if (warning.severity === 'medium') {
                        confirmMessage = '⚠️ ' + warning.warning + '\n\n' +
                            '📌 可能影响：\n' + warning.consequence + '\n\n' +
                            '确定要删除 "' + key + '" 吗？此操作不可撤销。';
                    } else {
                        confirmMessage = warning.warning + '\n\n' +
                            '💡 提示：\n' + warning.consequence + '\n\n' +
                            '确定要删除 "' + key + '" 吗？';
                    }
                } else {
                    confirmMessage = '确定要删除 "' + key + '" 吗？此操作不可撤销。';
                }

                if (!confirm(confirmMessage)) return;
                sendRequest('delete', key, '', idx);
            });
        }
    }

    addBtn.addEventListener('click', function(e) {
        e.preventDefault();
        var key = keyInput.value.trim();
        var value = valueInput.value.trim();

        if (!key) { showStatus('请输入标签键', true); return; }
        if (!value) { showStatus('请输入值', true); return; }

        sendRequest('add', key, value, null);
    });

    keyInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            valueInput.focus();
        }
    });

    valueInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            addBtn.click();
        }
    });

    var xhr = new XMLHttpRequest();
    xhr.open('GET', metaUrl, true);
    xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
    xhr.onload = function() {
        try {
            var resp = JSON.parse(xhr.responseText);
            if (resp.success) {
                renderTable(resp.metadata);
            } else {
                tbody.innerHTML = '<tr><td colspan="4" style="padding: 16px; text-align: center; color: #ba2121;">读取元数据失败</td></tr>';
            }
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="4" style="padding: 16px; text-align: center; color: #ba2121;">解析元数据失败</td></tr>';
        }
    };
    xhr.onerror = function() {
        tbody.innerHTML = '<tr><td colspan="4" style="padding: 16px; text-align: center; color: #ba2121;">网络请求失败</td></tr>';
    };
    xhr.send();
})();
</script>
{% endblock %}
